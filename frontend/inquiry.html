<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultas — Daniel Fotografía</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-tag">Estudio Fotográfico</span>
      <div class="brand-name">Daniel<br><em>Fotografía</em></div>
    </div>

    <nav class="nav-menu">
      <a href="/" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Asistente IA
      </a>
      <a href="/portfolio" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        Portafolio
      </a>
      <a href="/inquiry" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        Consultas
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="https://instagram.com/danielfotografia_2003" target="_blank" class="insta-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        @danielfotografia_2003
      </a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="chat-header">
      <div class="header-info">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Reserva tu Visión</h2>
        <p>Inicia una consulta para tu próxima sesión artística.</p>
      </div>
    </header>

    <div class="form-container">
      <form action="#" method="POST">
        <div class="form-group">
          <label for="name">Nombre Completo</label>
          <input type="text" id="name" class="form-control" placeholder="Ej. Juan Pérez" required>
        </div>
        
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
        </div>
        
        <div class="form-group">
          <label for="session-type">Tipo de Sesión</label>
          <select id="session-type" class="form-control" style="background: var(--bg-input); font-weight: 300;">
            <option value="editorial">Editorial / Moda</option>
            <option value="portrait">Retrato Personal</option>
            <option value="wedding">Boda / Evento Social</option>
            <option value="business">Corporate / Business</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="date">Fecha Tentativa</label>
          <input type="date" id="date" class="form-control">
        </div>
        
        <div class="form-group">
          <label for="message">Mensaje / Visión Artística</label>
          <textarea id="message" class="form-control" rows="4" placeholder="Cuéntanos un poco sobre lo que tienes en mente..."></textarea>
        </div>
        
        <div style="text-align: right;">
          <button type="submit" class="btn-primary">Enviar Consulta</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="/static/main.js" defer></script>
</body>
</html>
